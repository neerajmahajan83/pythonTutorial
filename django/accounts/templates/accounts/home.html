{% extends "base.html" %}

{% block title %}Dashboard Home{% endblock %}

{% block content %}
  <h2>Dashboard Home</h2>
  {% if user.is_authenticated %}
      <p>Hello, {{ user.username }}! You are securely logged in.</p>
      <p><a href="{% url 'logout' %}">Log Out</a></p>
  {% else %}
      <p>You are browsing anonymously.</p>
      <p><a href="{% url 'login' %}">Log In</a> or <a href="{% url 'signup' %}">Sign Up</a></p>
  {% endif %}
{% endblock %}
